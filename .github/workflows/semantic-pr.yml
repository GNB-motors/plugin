name: Semantic PR

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  semantic-pr:
    name: Validate PR title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      statuses: write
      checks: write

    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          scopes: |
            extension
            popup
            background
            content
            ci
            docs
            tests
            deps
            manifest
            api
            auth
            fleetedge
            telemetry
          requireScope: false
          subjectPattern: ^[A-Za-z].+$
          subjectPatternError: |
            PR title subject must start with a letter after the type/scope.
            Examples:
              ✅ feat(extension): Add multi-account support
              ✅ fix(popup): resolve auth token refresh bug
              ❌ feat: 123 fix (starts with number)
          wip: true
          validateSingleCommit: false
          validateSingleCommitMatchesPrTitle: false
