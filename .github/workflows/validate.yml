name: Validate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-extension

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npx @biomejs/biome format .

      - name: Unit + integration tests with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Verify dist artifacts
        run: |
          test -f dist/manifest.json || (echo "manifest.json missing from dist/" && exit 1)
          test -f dist/service-worker-loader.js || (echo "service worker missing from dist/" && exit 1)

      - name: Check bundle size
        run: npx size-limit

  cws-policy-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Manifest policy check
        run: node scripts/check-manifest-policy.cjs

      - name: Source secrets / banned-pattern scan
        run: node scripts/check-secrets.cjs

  security-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-extension

      - name: npm audit (high+critical only)
        run: npm audit --audit-level=high

  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  semgrep:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/javascript
