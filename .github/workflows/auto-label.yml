name: Auto Label

on:
  issues:
    types: [opened, edited]
  pull_request_target:
    types: [opened, edited]

permissions:
  issues: write
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse title and apply labels
        uses: actions/github-script@v9
        with:
          script: |
            const title = context.payload.issue?.title || context.payload.pull_request?.title || '';
            const body = context.payload.issue?.body || context.payload.pull_request?.body || '';
            const number = context.payload.issue?.number || context.payload.pull_request?.number;
            const isPR = !!context.payload.pull_request;

            const labelsToAdd = [];
            const labelsToRemove = [];

            // ── Priority from title prefix ──
            if (title.match(/^\[?P0\]?/i) || title.match(/critical|production.down|security.breach/i)) {
              labelsToAdd.push('priority/P0');
              labelsToRemove.push('priority/P1', 'priority/P2', 'priority/P3');
            } else if (title.match(/^\[?P1\]?/i) || title.match(/major.bug|blocking/i)) {
              labelsToAdd.push('priority/P1');
              labelsToRemove.push('priority/P0', 'priority/P2', 'priority/P3');
            } else if (title.match(/^\[?P2\]?/i) || title.match(/bug|fix|error/i)) {
              labelsToAdd.push('priority/P2');
              labelsToRemove.push('priority/P0', 'priority/P1', 'priority/P3');
            } else if (title.match(/^\[?P3\]?/i)) {
              labelsToAdd.push('priority/P3');
              labelsToRemove.push('priority/P0', 'priority/P1', 'priority/P2');
            }

            // ── Type from Conventional Commits prefix ──
            const typeMatch = title.match(/^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(|:)/);
            if (typeMatch) {
              const type = typeMatch[1];
              const typeMap = {
                feat: 'type/feature',
                fix: 'type/bug',
                docs: 'type/docs',
                chore: 'type/chore',
                refactor: 'type/chore',
                test: 'type/chore',
                build: 'type/chore',
                ci: 'type/chore',
              };
              if (typeMap[type]) labelsToAdd.push(typeMap[type]);
            }

            // ── Status labels for PRs ──
            if (isPR) {
              const pr = context.payload.pull_request;
              if (pr.draft) {
                labelsToAdd.push('status/draft');
              } else {
                labelsToAdd.push('status/needs-review');
                labelsToRemove.push('status/draft');
              }
            }

            // ── Apply labels ──
            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number,
                labels: [...new Set(labelsToAdd)],
              });
            }

            for (const label of labelsToRemove) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: number,
                  name: label,
                });
              } catch (e) { /* ignore if label doesn't exist */ }
            }
