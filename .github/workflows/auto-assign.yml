name: Auto Assign

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const isPR = !!context.payload.pull_request;
            const item = isPR ? context.payload.pull_request : context.payload.issue;
            const number = item.number;
            const labels = item.labels.map(l => l.name);

            // Single-owner setup: ItsDevayan is always the assignee.
            // CODEOWNERS handles review requests; this keeps the assignee
            // consistent regardless of who (or what bot) opens the PR/issue.
            const assignees = ['ItsDevayan'];

            if (assignees.length > 0) {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number,
                assignees: assignees,
              });
            }
