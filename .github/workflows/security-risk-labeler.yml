name: Security Risk Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  assess-security-risk:
    name: Assess security risk
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for high-risk changes
        id: high-risk
        run: |
          echo "Checking for high-risk file changes..."
          HIGH_RISK_FILES=(
            "extension/manifest.json"
            "extension/scripts/check-manifest-policy.cjs"
            "extension/scripts/check-secrets.cjs"
            "extension/src/background/auth.js"
            "extension/src/background/backendApi.js"
          )
          HIGH_RISK=false
          for file in "${HIGH_RISK_FILES[@]}"; do
            if git diff --name-only origin/${{ github.base_ref }}...${{ github.sha }} | grep -q "^$file$"; then
              echo "🔴 High-risk file changed: $file"
              HIGH_RISK=true
            fi
          done
          echo "high_risk=$HIGH_RISK" >> $GITHUB_OUTPUT

      - name: Check for medium-risk changes
        id: medium-risk
        run: |
          echo "Checking for medium-risk file changes..."
          MEDIUM_RISK_FILES=(
            "extension/package.json"
            "extension/package-lock.json"
            ".github/workflows/"
          )
          MEDIUM_RISK=false
          for file in "${MEDIUM_RISK_FILES[@]}"; do
            if git diff --name-only origin/${{ github.base_ref }}...${{ github.sha }} | grep -q "^$file"; then
              echo "🟡 Medium-risk file changed: $file"
              MEDIUM_RISK=true
            fi
          done
          echo "medium_risk=$MEDIUM_RISK" >> $GITHUB_OUTPUT

      - name: Label high security risk
        if: steps.high-risk.outputs.high_risk == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['security-risk:high']
            });
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'security-risk:low'
            }).catch(() => {});
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'security-risk:medium'
            }).catch(() => {});

      - name: Label medium security risk
        if: steps.high-risk.outputs.high_risk != 'true' && steps.medium-risk.outputs.medium_risk == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['security-risk:medium']
            });
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'security-risk:low'
            }).catch(() => {});
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'security-risk:high'
            }).catch(() => {});

      - name: Label low security risk
        if: steps.high-risk.outputs.high_risk != 'true' && steps.medium-risk.outputs.medium_risk != 'true'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['security-risk:low']
            });
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'security-risk:medium'
            }).catch(() => {});
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'security-risk:high'
            }).catch(() => {});
