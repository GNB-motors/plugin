name: Dependency Review

on:
  pull_request:
    branches: [Devayan, updated-design, main]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Block PRs adding vulnerable deps
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          license-check: false
