name: Stale Issues & PRs

on:
  schedule:
    - cron: '30 1 * * *'

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has been inactive for 60 days. It will be closed in 7 days
            unless there is new activity or it is marked with `pinned`, `security`,
            or `roadmap`.
          stale-pr-message: >
            This PR has been inactive for 30 days. It will be closed in 7 days
            unless there is new activity.
          close-issue-message: 'Closing due to inactivity. Feel free to reopen if still relevant.'
          close-pr-message: 'Closing due to inactivity. Feel free to reopen if still relevant.'
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-close: 7
          exempt-issue-labels: 'pinned,security,roadmap'
          exempt-pr-labels: 'pinned,security,roadmap'
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
