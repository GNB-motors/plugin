name: Welcome Contributors

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  pull-requests: write
  issues: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          pr-message: |
            🎉 Welcome, and thanks for your first pull request!

            A few quick checks before review:
            - [ ] PR title follows [Conventional Commits](https://www.conventionalcommits.org/)
            - [ ] `npm test` and `npm run lint` pass locally
            - [ ] The PR template is filled out (especially CWS impact)
            - [ ] `manifest.json` version is bumped only if releasing

            CI will run automatically. Please be patient — reviews usually happen within 24–48 hours.
          issue-message: |
            👋 Thanks for opening your first issue!

            We triage issues weekly. In the meantime, please make sure you've used the appropriate issue template and included reproduction steps if reporting a bug.
