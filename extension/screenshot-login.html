<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 640px; height: 400px; overflow: hidden;
    background: linear-gradient(135deg, #dde8ff 0%, #eef6ff 50%, #f5eeff 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  .card {
    width: 420px;
    padding: 32px 28px;
    background: rgba(255,255,255,0.75);
    -webkit-backdrop-filter: blur(16px);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.5);
    border-radius: 14px;
    box-shadow: 0 8px 32px rgba(15,23,42,0.10);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .login-logo {
    width: 52px; height: 52px;
    background: #0f172a; color: white;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 14px;
    box-shadow: 0 6px 14px rgba(15,23,42,0.18);
    transform: rotate(-5deg);
  }

  h1 { font-size: 15px; font-weight: 700; color: #0f172a; margin-bottom: 4px; }
  .subtitle { font-size: 12px; color: #64748b; margin-bottom: 24px; }

  .input-group { width: 100%; margin-bottom: 12px; }
  label { display: block; font-size: 11px; font-weight: 500; color: #475569; margin-bottom: 5px; }
  input {
    width: 100%; padding: 10px 12px;
    border: 1px solid rgba(0,0,0,0.1); border-radius: 6px;
    font-size: 13px; background: rgba(255,255,255,0.85);
    font-family: inherit; color: #94a3b8;
    outline: none;
  }

  .btn-login {
    width: 100%; margin-top: 6px;
    background: #0f172a; color: white; border: none;
    border-radius: 6px; padding: 12px;
    font-size: 13px; font-weight: 600;
    box-shadow: 0 4px 10px rgba(15,23,42,0.15);
    font-family: inherit; cursor: pointer;
    opacity: 0.7;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="login-logo">
      <svg viewBox="0 0 24 24" width="28" height="28" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="14" height="14" rx="2"></rect>
        <path d="M16 8l4 2v6h-4"></path>
        <circle cx="6" cy="18" r="2"></circle>
        <circle cx="16" cy="18" r="2"></circle>
      </svg>
    </div>
    <h1>gnbedge</h1>
    <p class="subtitle">Secure connection to your fleet data</p>
    <div class="input-group">
      <label>Email or Mobile</label>
      <input type="text" placeholder="Enter email or mobile number" />
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" placeholder="Enter password" />
    </div>
    <button class="btn-login">Sign In</button>
  </div>
</body>
</html>
